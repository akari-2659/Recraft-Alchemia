<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>リクラフト・アルケミア</title>
  <style>
    :root{color-scheme:light dark;--bg:#f7f2e8;--card:#fffaf0;--ink:#2d241b;--muted:#7b6a58;--line:#d8c7aa;--accent:#8b5e34;--accent2:#c28b45}
    *{box-sizing:border-box} body{margin:0;min-height:100svh;display:grid;place-items:center;font-family:"Yu Gothic","Hiragino Sans",system-ui,sans-serif;background:radial-gradient(circle at top,#fff8e8 0,#f7f2e8 44%,#eadcc7 100%);color:var(--ink);padding:24px}
    main{width:min(760px,100%);background:rgba(255,250,240,.92);border:1px solid var(--line);border-radius:24px;padding:32px;box-shadow:0 20px 60px rgba(80,50,20,.14)}
    h1{margin:0 0 10px;font-size:clamp(28px,5vw,42px);letter-spacing:.04em} p{margin:0;color:var(--muted);line-height:1.8}.actions{display:grid;gap:14px;margin-top:28px}a{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 20px;border-radius:18px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;text-decoration:none;font-weight:700;box-shadow:0 12px 28px rgba(139,94,52,.24)}a span{font-size:13px;opacity:.9;font-weight:500}.note{margin-top:22px;font-size:13px}
  </style>
</head>
<body>
  <main>
    <h1>リクラフト・アルケミア</h1>
    <p>キャラクター作成ツールの入口です。管理ツールへのリンクは公開ページには置いていません。</p>
    <div class="actions">
      <a href="character.html">キャラクター作成ツールを開く <span>character.html</span></a>
    </div>
    <p class="note">DB管理ツールは管理者ローカル用ファイルから開いてください。</p>
  </main>
</body>
</html>
